# =============================================================================
# BUILDEX — Nginx site config
# =============================================================================
# Place at /etc/nginx/sites-available/buildex.mila-knight.com
# Symlink to    /etc/nginx/sites-enabled/buildex.mila-knight.com
#
# Then:  sudo nginx -t  &&  sudo systemctl reload nginx
#
# This file is fully isolated from any other site on the server.
# It binds ONLY to server_name=buildex.mila-knight.com.
# =============================================================================

# HTTP -> HTTPS redirect. Certbot rewrites this block once SSL is issued.
server {
    listen 80;
    listen [::]:80;
    server_name buildex.mila-knight.com;

    # ACME challenge for certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Until certbot runs, proxy normally on port 80 too so the site is reachable.
    location / {
        proxy_pass            http://127.0.0.1:3010;
        proxy_http_version    1.1;
        proxy_set_header      Upgrade           $http_upgrade;
        proxy_set_header      Connection        "upgrade";
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_cache_bypass    $http_upgrade;
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
    }
}

# After running:
#   sudo certbot --nginx -d buildex.mila-knight.com
# Certbot will automatically:
#   1. Inject the listen 443 ssl block below
#   2. Add ssl_certificate / ssl_certificate_key paths
#   3. Convert the :80 block into a 301 redirect to https
